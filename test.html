<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Practice - Lessons 10.2 to 11.3</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    background:#0f172a;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    color:#60a5fa;
    margin-bottom:10px;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:30px;
}

.question-box{
    background:#1e293b;
    padding:25px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.question{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
    line-height:1.5;
}

label{
    display:block;
    margin:12px 0;
    background:#334155;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

label:hover{
    background:#475569;
}

input[type="radio"]{
    margin-right:10px;
}

input[type="text"]{
    width:650px;
    max-width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:17px;
    outline:none;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

button{
    background:#2563eb;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

.correct{
    margin-top:20px;
    background:#14532d;
    padding:15px;
    border-radius:10px;
    color:#bbf7d0;
    line-height:1.7;
}

.wrong{
    margin-top:20px;
    background:#7f1d1d;
    padding:15px;
    border-radius:10px;
    color:#fecaca;
    line-height:1.8;
}

#score{
    margin-top:40px;
    font-size:32px;
    font-weight:bold;
    color:#4ade80;
}

.hidden{
    display:none;
}

.block-title{
    margin:40px 0 20px 0;
    color:#93c5fd;
    font-size:28px;
}

.progress{
    margin-bottom:30px;
    color:#94a3b8;
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>English Practice</h1>

<div class="subtitle">
Lessons 10.2 → 11.3
</div>

<div class="progress" id="progress">
Questions 1 - 10
</div>

<div id="quiz"></div>

<div class="buttons">
<button onclick="checkAnswers()">
Check Answers
</button>

<button onclick="nextQuestions()">
Next 10 Questions
</button>
</div>

<div id="score"></div>

</div>

<script>

// ======================================
// QUESTION BANK
// ======================================

const allQuestions = [

{
type:"multiple",
question:"A plane is ____ than a bus.",
options:["faster","fastest","more fast"],
answer:"faster",
explanation:"Comparatives compare TWO things. Fast → faster."
},

{
type:"text",
question:"Flying is the ____ way to travel.",
answer:"fastest",
explanation:"Superlative = the fastest."
},

{
type:"text",
question:"English is ____ than Chinese.",
answer:"easier",
explanation:"Easy → easier."
},

{
type:"multiple",
question:"Which is correct?",
options:["more cheap","cheaper","cheapest"],
answer:"cheaper",
explanation:"Cheap is a short adjective. Use cheaper."
},

{
type:"text",
question:"This is the ____ ticket.",
answer:"cheapest",
explanation:"Cheapest = superlative of cheap."
},

{
type:"text",
question:"Modern planes are ____ economical than older planes.",
answer:"more",
explanation:"Long adjectives use MORE."
},

{
type:"text",
question:"Cars are ____ dangerous than planes.",
answer:"more",
explanation:"Dangerous is long → more dangerous."
},

{
type:"multiple",
question:"Which is the superlative?",
options:["better","best","more good"],
answer:"best",
explanation:"Good → best."
},

{
type:"text",
question:"Driving is the ____ option.",
answer:"worst",
explanation:"Bad → worse → worst."
},

{
type:"text",
question:"The TGV is the ____ train in Europe.",
answer:"fastest",
explanation:"Fastest = superlative."
},

{
type:"text",
question:"My flight is ____.",
answer:"delayed",
explanation:"Delayed = atrasado."
},

{
type:"multiple",
question:"Which word means 'bagagem'?",
options:["passport","ticket","luggage"],
answer:"luggage",
explanation:"Luggage = bagagem."
},

{
type:"text",
question:"Boarding starts at ____ 15.",
answer:"gate",
explanation:"Gate = portão."
},

{
type:"text",
question:"I need my ____ to travel internationally.",
answer:"passport",
explanation:"Passport = passaporte."
},

{
type:"multiple",
question:"Window seat or ____ seat?",
options:["aisle","hall","door"],
answer:"aisle",
explanation:"Aisle seat = corredor."
},

{
type:"text",
question:"Do you have any hand ____?",
answer:"luggage",
explanation:"Hand luggage = bagagem de mão."
},

{
type:"text",
question:"The flight is ____.",
answer:"cancelled",
explanation:"Cancelled = cancelado."
},

{
type:"multiple",
question:"We are boarding now.",
options:["embarcando","cancelando","esperando"],
answer:"embarcando",
explanation:"Boarding = embarcando."
},

{
type:"text",
question:"Here is your boarding ____.",
answer:"pass",
explanation:"Boarding pass = cartão de embarque."
},

{
type:"text",
question:"I prefer a window ____.",
answer:"seat",
explanation:"Window seat = assento da janela."
},

{
type:"text",
question:"I have ____ tickets.",
answer:"some",
explanation:"Some = frases positivas."
},

{
type:"text",
question:"Do you have ____ luggage?",
answer:"any",
explanation:"Any = perguntas."
},

{
type:"text",
question:"There are ____ flights today.",
answer:"no",
explanation:"No = nenhum."
},

{
type:"multiple",
question:"We don't have ____ information.",
options:["some","any","many"],
answer:"any",
explanation:"Any = negativas."
},

{
type:"text",
question:"I have ____ hand luggage.",
answer:"some",
explanation:"Some = positiva."
},

{
type:"text",
question:"____ we discuss the project tomorrow?",
answer:"shall",
explanation:"Shall we = sugestão."
},

{
type:"text",
question:"Let's ____ a meeting.",
answer:"arrange",
explanation:"Arrange = organizar."
},

{
type:"multiple",
question:"Which expression is correct?",
options:[
"Let's discuss now",
"Let discuss now",
"Shall discuss now"
],
answer:"Let's discuss now",
explanation:"After let's → verb."
},

{
type:"text",
question:"First let's talk about prices. ____ we can discuss the website.",
answer:"then",
explanation:"Then = depois."
},

{
type:"text",
question:"This job is very ____.",
answer:"urgent",
explanation:"Urgent = urgente."
},

{
type:"text",
question:"I am going to ____ tomorrow.",
answer:"travel",
explanation:"Going to + verb."
},

{
type:"multiple",
question:"Which is correct?",
options:[
"I going to travel",
"I'm going to travel",
"I am go to travel"
],
answer:"I'm going to travel",
explanation:"Correct structure: be + going to."
},

{
type:"text",
question:"She is ____ to call the client.",
answer:"going",
explanation:"Is going to."
},

{
type:"text",
question:"We are going to ____ the website.",
answer:"discuss",
explanation:"Discuss = discutir."
},

{
type:"text",
question:"Our ____ is to finish the project.",
answer:"goal",
explanation:"Goal = meta."
},

{
type:"multiple",
question:"The target ____ is December.",
options:["goal","date","schedule"],
answer:"date",
explanation:"Target date = data alvo."
},

{
type:"text",
question:"They are not going to ____ the design.",
answer:"change",
explanation:"Change = mudar."
},

{
type:"text",
question:"What are you going to ____ tonight?",
answer:"do",
explanation:"Do = fazer."
},

{
type:"multiple",
question:"Which is correct?",
options:[
"We going to work",
"We are going to work",
"We are go to work"
],
answer:"We are going to work",
explanation:"Correct future structure."
},

{
type:"text",
question:"We are going to ____ a meeting.",
answer:"arrange",
explanation:"Arrange a meeting."
},

{
type:"text",
question:"I've got a ____ at the hotel.",
answer:"reservation",
explanation:"Reservation = reserva."
},

{
type:"text",
question:"Could I check ____ please?",
answer:"out",
explanation:"Check out = sair do hotel."
},

{
type:"multiple",
question:"Can I pay by credit ____?",
options:["ticket","card","reservation"],
answer:"card",
explanation:"Credit card."
},

{
type:"text",
question:"Would you like a wake-up ____?",
answer:"call",
explanation:"Wake-up call."
},

{
type:"text",
question:"Here's the key for your ____.",
answer:"room",
explanation:"Room = quarto."
},

{
type:"multiple",
question:"Have you got a reservation?",
options:["Pergunta","Negativa","Afirmação"],
answer:"Pergunta",
explanation:"Have you got...? = pergunta."
},

{
type:"text",
question:"My company is paying the ____.",
answer:"bill",
explanation:"Bill = conta."
},

{
type:"text",
question:"I had juice from the mini____.",
answer:"bar",
explanation:"Minibar."
},

{
type:"multiple",
question:"Which is correct?",
options:[
"I've got a reservation",
"I got reservation",
"I have reservation"
],
answer:"I've got a reservation",
explanation:"Estrutura correta com have got."
},

{
type:"text",
question:"She ____ got the key.",
answer:"has",
explanation:"She has got."
},

{
type:"text",
question:"We haven't got any ____.",
answer:"tickets",
explanation:"Any + plural."
}

];

// ======================================
// VARIABLES
// ======================================

let currentBlock = 0;
let score = 0;

const shuffledQuestions = shuffle(allQuestions);

// ======================================
// SHUFFLE
// ======================================

function shuffle(array){

for(let i = array.length -1; i > 0; i--){

const j = Math.floor(Math.random() * (i+1));

[array[i],array[j]] = [array[j],array[i]];

}

return array;

}

// ======================================
// RENDER QUESTIONS
// ======================================

function renderQuestions(){

const quiz = document.getElementById("quiz");

quiz.innerHTML = "";

const start = currentBlock * 10;
const end = start + 10;

const blockQuestions = shuffledQuestions.slice(start,end);

blockQuestions.forEach((q,index)=>{

const realIndex = start + index;

let html = `
<div class="question-box">

<div class="question">
${realIndex + 1}. ${q.question}
</div>
`;

if(q.type === "multiple"){

q.options.forEach(option=>{

html += `
<label>

<input type="radio"
name="q${realIndex}"
value="${option}">

${option}

</label>
`;

});

}else{

html += `
<input type="text" id="q${realIndex}">
`;

}

html += `
<div id="feedback${realIndex}"></div>
</div>
`;

quiz.innerHTML += html;

});

document.getElementById("progress").innerHTML =
`Questions ${start+1} - ${end}`;

}

// ======================================
// CHECK ANSWERS
// ======================================

function checkAnswers(){

const start = currentBlock * 10;
const end = start + 10;

for(let i=start;i<end;i++){

const q = shuffledQuestions[i];

const feedback =
document.getElementById(`feedback${i}`);

let correct = false;
let userAnswer = "";

if(q.type === "multiple"){

const checked =
document.querySelector(`input[name="q${i}"]:checked`);

if(checked){

userAnswer = checked.value;

if(userAnswer === q.answer){
correct = true;
}

}

}else{

const input =
document.getElementById(`q${i}`);

userAnswer =
input.value.trim().toLowerCase();

if(userAnswer === q.answer.toLowerCase()){
correct = true;
}

}

if(correct){

score++;

feedback.innerHTML = `
<div class="correct">

✔ Correct!

</div>
`;

}else{

feedback.innerHTML = `
<div class="wrong">

✘ Wrong Answer<br><br>

<b>Your answer:</b>
${userAnswer || "No answer"}<br><br>

<b>Correct answer:</b>
${q.answer}<br><br>

<b>Explanation:</b><br>
${q.explanation}

</div>
`;

}

}

document.getElementById("score").innerHTML =
`Score: ${score}`;

}

// ======================================
// NEXT QUESTIONS
// ======================================

function nextQuestions(){

currentBlock++;

if(currentBlock * 10 >= shuffledQuestions.length){

document.getElementById("quiz").innerHTML = `
<h2>Quiz Finished!</h2>
`;

document.getElementById("progress").innerHTML =
"Completed";

return;

}

renderQuestions();

}

// ======================================

renderQuestions();

</script>

</body>
</html>
