function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function normalizeText(s){
  return String(s || "")
    .trim()
    .toLowerCase()
    .replace(/[.!?,;:]/g, "")
    .replace(/\s+/g, " ");
}

  currentTopic = topic;
  currentQuestions = shuffle([...topics[topic]]);
  currentPage = 0;
  totalScore = 0;
  document.getElementById("topicTitle").textContent = topic.toUpperCase();
  document.getElementById("score").innerHTML = "";
  document.getElementById("checkBtn").classList.remove("hidden");
  renderPage();
}

function renderPage(){
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  const start = currentPage * 10;
  const end = start + 10;
  const pageQuestions = currentQuestions.slice(start, end);

  document.getElementById("progress").textContent =
    `Showing questions ${start + 1} to ${Math.min(end, currentQuestions.length)} of ${currentQuestions.length}`;

  pageQuestions.forEach((q, index) => {
    const realIndex = start + index;
    let html = `
      <div class="question-box">
        <div class="question">${realIndex + 1}. ${q.question}</div>
    `;

    if(q.type === "multiple"){
      q.options.forEach(option => {
        html += `
          <label>
            <input type="radio" name="q${realIndex}" value="${option}">
            ${option}
          </label>
        `;
      });
    }else{
      html += `<input type="text" id="q${realIndex}" autocomplete="off" spellcheck="false">`;
    }

    html += `<div id="feedback${realIndex}"></div></div>`;
    quiz.innerHTML += html;
  });

  const oldBtn = document.getElementById("nextBtn");
  if(oldBtn) oldBtn.remove();

  if(end < currentQuestions.length){
    const nextBtn = document.createElement("button");
    nextBtn.id = "nextBtn";
    nextBtn.type = "button";
    nextBtn.textContent = "Next 10 Questions";
    nextBtn.onclick = nextPage;
    quiz.appendChild(nextBtn);
  }
}

function checkAnswers(){
  const start = currentPage * 10;
  const end = start + 10;
  let pageScore = 0;

  for(let i = start; i < end; i++){
    const q = currentQuestions[i];
    if(!q) continue;

    const feedback = document.getElementById(`feedback${i}`);
    let correct = false;
    let userAnswer = "";

    if(q.type === "multiple"){
      const checked = document.querySelector(`input[name="q${i}"]:checked`);
      if(checked){
        userAnswer = checked.value;
        if(userAnswer === q.answer) correct = true;
      }
    }else{
      const input = document.getElementById(`q${i}`);
      userAnswer = normalizeText(input.value);
      if(userAnswer === normalizeText(q.answer)) correct = true;
    }

    if(correct){
      pageScore++;
      totalScore++;
      feedback.innerHTML = `<div class="correct">✔ Correct!</div>`;
    }else{
      feedback.innerHTML = `
        <div class="wrong">
          ✘ Wrong Answer<br><br>
          <b>Your answer:</b> ${userAnswer || "No answer"}<br><br>
          <b>Correct answer:</b> ${q.answer}<br><br>
          <b>Explanation:</b><br>
          ${q.explanation}
        </div>
      `;
    }
  }

  document.getElementById("score").innerHTML =
    `Page Score: ${pageScore}/10 | Total Score: ${totalScore}`;
}

function nextPage(){
  currentPage++;
  renderPage();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>

</html>
