<!DOCTYPE html>
<html lang="en">
<head>

<title>English Study Quiz</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    background:#0f172a;
    font-family:Arial, sans-serif;

.container{

}

h1{

.topic-buttons{

    flex-wrap:wrap;

.question{

    background:#334155;

}

label:hover{
    background:#475569;
}

input[type="radio"]{

}

input[type="text"]{

    padding:16px;
    border:none;
    border-radius:10px;
    background:#334155;

}

button{
    border:none;
    padding:15px 25px;
    border-radius:10px;
    color:white;
    font-size:17px;
    cursor:pointer;
    background:#2563eb;
}

button:hover{
    background:#1e40af;
}

.correct{
    margin-top:20px;
    background:#14532d;
    color:#bbf7d0;
    padding:15px;
    border-radius:10px;
}

.wrong{
    margin-top:20px;
    background:#7f1d1d;
    color:#fecaca;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

#score{
    margin-top:30px;
    font-size:30px;
    color:#4ade80;
    font-weight:bold;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="topic-title" id="topicTitle">

</div>

<div class="topic-buttons">

<button onclick="loadTopic('comparatives')">

</button>

</button>

</button>

<button onclick="loadTopic('hotel')">

</button>

<div id="quiz"></div>

<button id="checkBtn"
class="hidden"
onclick="checkAnswers()">
Check Answers
</button>

</div>

{

},

{

},

{

question:"Buses are ____ comfortable than planes.",
answer:"less",
explanation:"Less comfortable."
},

{
type:"text",

answer:"easier",

},

// ====================

// ====================

{
type:"multiple",

options:["faster","fastest","more fast"],

},

{

question:"This phone is ____ modern than mine.",
answer:"more",

{
type:"text",
question:"Today is the ____ day of the week.",
answer:"worst",

},

{
type:"multiple",
question:"Cheap →",
options:["cheapest","cheaper","cheap"],
answer:"cheapest",
explanation:"Cheapest = superlative."
},

{
type:"text",
question:"This train is ____ than the bus.",
answer:"faster",

},

{
type:"text",
question:"This test is the ____ one.",
answer:"most difficult",

},

{
type:"multiple",
question:"Safe →",
options:["safer","safest","safe"],
answer:"safer",
explanation:"Safe → safer."
},

{
type:"text",
question:"My bag is ____ heavy than yours.",
answer:"less",
explanation:"Less heavy."
},

{
type:"text",
question:"English is the ____ language for me.",
answer:"easiest",
explanation:"Easy → easiest."
},

{
type:"multiple",

options:["further","farer","most far"],

}

{

{

{

answer:"early",

{

explanation:"Large = grande."
},

options:["adiantado","atrasado","embarque"],

},

{

question:"Please take your ____.",
answer:"seat",
explanation:"Take your seat."
}

]

};



// ====================================
// VARIABLES
// ====================================

let currentQuestions = [];
let currentPage = 0;
let totalScore = 0;

// ====================================
// LOAD TOPIC
// ====================================

function loadTopic(topic){

// embaralha SOMENTE o tópico atual
currentQuestions = shuffle([...topics[topic]]);

currentPage = 0;

totalScore = 0;

document.getElementById("score").innerHTML = "";

document.getElementById("topicTitle")
.innerHTML = topic.toUpperCase();

document.getElementById("checkBtn")
.classList.remove("hidden");

renderPage();

}

// ====================================
// SHUFFLE
// ====================================

function shuffle(array){

for(let i = array.length -1; i > 0; i--){

const j = Math.floor(Math.random() * (i + 1));

[array[i], array[j]] =
[array[j], array[i]];

}

return array;

}

// ====================================
// RENDER PAGE
// ====================================

function renderPage(){

const quiz =
document.getElementById("quiz");

quiz.innerHTML = "";

const start = currentPage * 10;

const end = start + 10;

const pageQuestions =
currentQuestions.slice(start,end);

pageQuestions.forEach((q,index)=>{

const realIndex = start + index;

let html = `
<div class="question-box">

<div class="question">
${realIndex + 1}. ${q.question}
</div>
`;

if(q.type === "multiple"){

q.options.forEach(option=>{

html += `
<label>

<input type="radio"
name="q${realIndex}"
value="${option}">

${option}

</label>
`;

});

}else{

html += `
<input type="text"
id="q${realIndex}">
`;

}

html += `
<div id="feedback${realIndex}"></div>
</div>
`;

quiz.innerHTML += html;

});

// botão próxima página
if(document.getElementById("nextBtn")){

document.getElementById("nextBtn").remove();

}

if(end < currentQuestions.length){

const nextBtn =
document.createElement("button");

nextBtn.id = "nextBtn";

nextBtn.innerHTML =
"Next 10 Questions";

nextBtn.style.marginTop = "20px";

nextBtn.onclick = nextPage;

quiz.appendChild(nextBtn);

}

}

// ====================================
// CHECK ANSWERS
// ====================================

function checkAnswers(){

const start = currentPage * 10;

const end = start + 10;

let pageScore = 0;

for(let i=start;i<end;i++){

const q = currentQuestions[i];

if(!q) continue;

const feedback =
document.getElementById(`feedback${i}`);

let correct = false;

let userAnswer = "";

if(q.type === "multiple"){

const checked =
document.querySelector(`input[name="q${i}"]:checked`);

if(checked){

userAnswer = checked.value;

if(userAnswer === q.answer){

correct = true;

}

}

}else{

const input =
document.getElementById(`q${i}`);

userAnswer =
input.value.trim().toLowerCase();

if(userAnswer === q.answer.toLowerCase()){

correct = true;

}

}

if(correct){

pageScore++;
totalScore++;

feedback.innerHTML = `
<div class="correct">

✔ Correct!

</div>
`;

}else{

feedback.innerHTML = `
<div class="wrong">

✘ Wrong Answer<br><br>

<b>Your answer:</b>
${userAnswer || "No answer"}<br><br>

<b>Correct answer:</b>
${q.answer}<br><br>

<b>Explanation:</b><br>
${q.explanation}

</div>
`;

}

}

document.getElementById("score")
.innerHTML =
`Page Score: ${pageScore}/10 |
Total Score: ${totalScore}`;

}

// ====================================
// NEXT PAGE
// ====================================

function nextPage(){

currentPage++;

renderPage();

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
</html>
