<script>
// Scripts Reintegrados e Preservados
$(function() {
    new WOW().init();
    $(".header-logo-desc p").typed({
        strings: ["Início?", "Home?"],
        loop: true,
        startDelay: 1000,
        backDelay: 2000
    });
    $('.scrolling-menu').slicknav({ prependTo: '.menu-mobile2', label: '' });

    $('#nav').onePageNav();
    $('.slide-in').onePageNav();

    // Menu Sticky Scroll
    $(window).on('scroll', function() {
        var scroll = $(this).scrollTop();
        if (scroll < 200) {
            $('#head-trigger').removeClass('scrolled-header');
        } else {
            $('#head-trigger').addClass('scrolled-header');
        }
    });

    // Desaparecer Loading Screen
    $(window).bind("load", function () {
        $("#loader").fadeOut("slow");
        $("#preloader").delay(0).fadeOut();
    });
});
</script>
